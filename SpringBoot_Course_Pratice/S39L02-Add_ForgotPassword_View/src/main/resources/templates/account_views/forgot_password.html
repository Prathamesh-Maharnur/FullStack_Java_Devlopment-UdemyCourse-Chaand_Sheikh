<!DOCTYPE html>
<html lang="en" xmlns="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head}">

<body class="sub_page">

  <div class="hero_area">
    <div class="bg-box">
      <img src="images/nav-bg.jpg" alt="">
    </div>
    <header th:replace="~{fragments/header :: header}">
  </div>

  <!-- book section -->
  <section class="book_section layout_padding">
    <div class="container">
      <div class="heading_container">
        <h2>
          Forgot Password
        </h2>
      </div>
      <div class="row">
        <div class="col-md-6">
          <div class="form_container">
            <form action="#" th:action="@{/reset_password}" method="post">
              <div>
                <input id="email" name="email" type="email" class="form-control" placeholder="Enter email" />
              </div>
              <div class="btn_box">
                <button type="submit">
                  Reset password
                </button>
              </div>
              <hr>
              <div>
                <a th:href="@{/login}" class="link-secondary">Login</a>
              </div>
            </form>
          </div>
        </div>
        <div class="col-md-6">
          <div class="map_container ">
            <div id="googleMap"></div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <!-- end book section -->

  <!-- end about section -->
  <footer th:replace="~{fragments/footer :: footer}">
</body>

</html>
