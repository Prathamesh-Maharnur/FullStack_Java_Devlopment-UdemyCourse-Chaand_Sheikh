<!DOCTYPE html>
<html>

<head th:replace="~{fragments/head :: head}">

<body class="sub_page">

  <div class="hero_area">
    <div class="bg-box">
      <img th:src="@{/images/nav-bg.jpg}" alt="">
    </div>
    <header th:replace="~{fragments/header :: header}">
  </div>

  <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="exampleModalLabel">Danger</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          Are you sure?
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <a th:href="@{'/posts/'+ ${post.id} + '/delete'}">
            <button type="button" class="btn btn-danger btn-lg">Delete</button>
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- about section -->

  <section class="about_section layout_padding">
    <div class="container  ">
      <div class="posts">
        <h3><a th:text="${post.title}">Title</a></h3>

        <h5 th:text="'Author: ' + ${post.account.firstname} + 
        ' | Created At: ' + ${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}+
        ' | Updated At: ' + ${#temporals.format(post.updatedAt, 'yyyy-MM-dd HH:mm')} 
        "></h5>
        <p th:utext="${post.body}">Body</p>
        <div sec:authorize="isAuthenticated()" th:if="${isOwner}">
          <a th:href="@{'/posts/'+ ${post.id} + '/edit'}">
            <button type="button" class="btn btn-secondary btn-lg">Edit</button>
          </a> |
          <button type="button" class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#exampleModal">
            Delete
          </button>
        </div>

      </div>
  </section>

  <!-- end about section -->
  <footer th:replace="~{fragments/footer :: footer}">
</body>

</html>
