<!DOCTYPE html>
<html>

<head th:replace="~{fragments/head :: head}">

<body class="sub_page">

  <div class="hero_area">
    <div class="bg-box">
      <img th:src="@{/images/nav-bg.jpg}" alt="">
    </div>
    <header th:replace="~{fragments/header :: header}">
  </div>

  <!-- about section -->

  <section class="about_section layout_padding">
    <div class="container  ">
      <div class="posts">
        <h3><a th:text="${post.title}">Title</a></h3>
        <h5 th:text="'Author: ' + ${post.account.firstname} + ' | Created At: ' + ${post.createdAt}"></h5>
        <p th:utext="${post.body}">Body</p>
        <div sec:authorize="isAuthenticated()" th:if="${isOwner}">
          <a th:href="@{'/posts/'+ ${post.id} + '/edit'}">
            <button type="button" class="btn btn-secondary btn-lg">Edit</button></a>
        </div>
      </div>
  </section>

  <!-- end about section -->
  <footer th:replace="~{fragments/footer :: footer}">
</body>

</html>
