<!DOCTYPE html>
<html>

<head th:replace="~{fragments/head :: head}">

<body class="sub_page">

  <div class="hero_area">
    <div class="bg-box">
      <img src="images/nav-bg.jpg" alt="">
    </div>
    <header th:replace="~{fragments/header :: header}">
  </div>

  <!-- book section -->
  <section class="book_section layout_padding">
    <div class="container">
      <div class="heading_container">
        <h2>
          Register
        </h2>
      </div>
      <div class="row">
        <div class="col-md-6">
          <div class="form_container">
            <form action="#" th:action="@{/register}" th:object="${account}" method="post" novalidate>
              <div>
                <input id="email" name="email" type="email" class="form-control" th:field="*{email}"
                  placeholder="Enter email" />
                <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Email error</p>
              </div>
              <div>
                <input id="password" name="password" type="password" class="form-control" th:field="*{password}"
                  placeholder="Enter password" />
              </div>
              <div>
                <input id="firstname" type="text" class="form-control" th:field="*{firstname}"
                  placeholder="Enter your name" />
              </div>

              <div class="btn_box">
                <button type="submit">
                  Register
                </button>
              </div>
            </form>
          </div>
        </div>
        <div class="col-md-6">
          <div class="map_container ">
            <div id="googleMap"></div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <!-- end book section -->

  <!-- end about section -->
  <footer th:replace="~{fragments/footer :: footer}">
</body>

</html>
