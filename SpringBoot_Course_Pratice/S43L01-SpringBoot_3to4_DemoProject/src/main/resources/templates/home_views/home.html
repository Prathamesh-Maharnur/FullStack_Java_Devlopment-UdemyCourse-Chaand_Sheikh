<!DOCTYPE html>
<html>

<head th:replace="~{fragments/head :: head}">

<body class="sub_page">

  <div class="hero_area">
    <div class="bg-box">
      <img th:src="@{/images/nav-bg.jpg}" alt="">
    </div>
    <header th:replace="~{fragments/header :: header}">
  </div>

  <!-- about section -->
  <form action="/" method="get">
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Sort By: </span>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item" style="padding-right: 20px;">
              <div class="dropdown">
                <select clas="form-select" aria-label="Default select example" name="sort_by">
                  <option value="createdAt">Created date</option>
                  <option value="updatedAt">Updated date</option>
                </select>
              </div>
            </li>

            <span class="navbar-brand mb-0 h1">Per page: </span>
            <li class="nav-item" style="padding-right: 20px;">
              <div class="dropdown">
                <select class="" aria-label="Default select example" name="per_page">
                  <option selected value="2">2</option>
                  <option value="5">5</option>
                  <option value="10">10</option>
                  <option value="15">15</option>
                </select>
              </div>
            </li>

            <li class="nav-item">
              <button type="submit" class="btn btn-primary" id="dropDownMenuButton">
                Apply filter(s)
              </button>
            </li>

          </ul>
        </div>
      </div>
    </nav>
  </form>


  <section class="about_section layout_padding">
    <div class="container  ">
      <div class="posts" th:each="post : ${posts}">
        <h3><a th:href="@{'/posts/' + ${post.id}}" th:text="${post.title}">Title</a></h3>
        <h5 th:text="'Author: ' + ${post.account.firstname} + 
        ' | Created At: ' + ${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}+
        ' | Updated At: ' + ${#temporals.format(post.updatedAt, 'yyyy-MM-dd HH:mm')} 
        "></h5>
        <p th:utext="${post.body}">Body</p>
        <hr />
      </div>

      <nav th:if="${links ne null}" aria-label="...">
        <ul class="pagination justify-content-center">
          <th:block th:each="link:${links}">
            <li class="page-item">
              <th:block th:utext="${link}">link</th:block>
            </li>
        </ul>
      </nav>

    </div>
  </section>

  <!-- end about section -->
  <footer th:replace="~{fragments/footer :: footer}">
</body>

</html>
